name: gnyaan
description: "Gnyaan — AI-Powered Knowledge Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI / Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1
  dotted_border: ^2.1.0

  # Icons
  lucide_icons: ^0.257.0
  cupertino_icons: ^1.0.8

  # File Handling
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
